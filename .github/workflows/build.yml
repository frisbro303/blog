name: Build
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install marimo
      - run: |
          mkdir -p docs/posts/_raw
          for f in posts/*.py; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .py)
            marimo export html-wasm "$f" -o "docs/posts/_raw/$name.html"
            python inject.py "$name"
          done
          python build_static.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - uses: actions/deploy-pages@v4
