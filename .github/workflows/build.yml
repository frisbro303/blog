name: Build
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install marimo
      - run: |
          mkdir -p assets/notebooks
          for f in posts/*.py; do
            name=$(basename "$f" .py)
            marimo export html-wasm "$f" -o "assets/notebooks/$name.html"
          done

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - run: bundle exec jekyll build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/
      - uses: actions/deploy-pages@v4
