<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --text: #1a1a1a;
      --muted: #777;
      --border: #e5e5e2;
      --accent: #1a1a1a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 1.15rem;
      min-height: 100vh;
    }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    nav .name {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav ul a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    nav ul a:hover, nav ul a.active { color: var(--text); }

    .hero {
      max-width: 640px;
      margin: 5rem auto 4rem;
      padding: 0 1.5rem;
    }

    .hero h2 {
      font-size: 1.05rem;
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .hero p {
      font-size: 1.25rem;
      line-height: 1.75;
      color: var(--text);
    }

    .section {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 1.5rem 6rem;
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .posts { list-style: none; }

    .posts li {
      border-top: 1px solid var(--border);
      padding: 1.4rem 0;
    }

    .posts li:last-child { border-bottom: 1px solid var(--border); }

    .posts a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .posts a:hover .title { text-decoration: underline; text-underline-offset: 3px; }

    .title {
      font-size: 1.15rem;
      font-weight: 500;
      display: block;
      margin-bottom: 0.3rem;
    }

    .excerpt {
      font-style: italic;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
      display: block;
      margin-bottom: 0.5rem;
    }

    .date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <nav>
    <a class="name" href="./">Your Name</a>
    <ul>
      <li><a href="./" class="active">posts</a></li>
      <li><a href="about.html">about</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h2>writing</h2>
    <p>
      Notes on mathematics and computing — numerical methods, probability,
      algorithms, and experiments. Written as interactive notebooks.
    </p>
  </div>

  <div class="section">
    <p class="section-label">All posts</p>
    <ul class="posts">
      <li>
        <a href="posts/hello-world.html">
          <span class="title">Hello World</span>
          <span class="excerpt">A first post to test the setup.</span>
          <span class="date">2026-05-30</span>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
